<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">FinTrack favicon</title>
  <desc id="desc">Premium gradient wallet icon for FinTrack personal finance manager.</desc>

  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="wallet" x1="18" y1="19" x2="47" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DFF7FF"/>
    </linearGradient>

    <linearGradient id="shine" x1="16" y1="10" x2="45" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity=".34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#020617" flood-opacity=".26"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="17" fill="url(#bg)" filter="url(#shadow)"/>
  <path d="M14 17c8-8 21-10 32-5 5 2 9 6 12 11V10a6 6 0 0 0-6-6H21c-8 0-14 6-17 13Z" fill="url(#shine)"/>

  <g fill="none" stroke="url(#wallet)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18.5 21.5h25a4.5 4.5 0 0 1 4.5 4.5v17a4.5 4.5 0 0 1-4.5 4.5h-25A4.5 4.5 0 0 1 14 43V26a4.5 4.5 0 0 1 4.5-4.5Z"/>
    <path d="M14.8 27.5h27.7"/>
    <path d="M40 32h8v10h-8a5 5 0 0 1 0-10Z"/>
  </g>

  <circle cx="40.5" cy="37" r="1.75" fill="#FFFFFF"/>
  <circle cx="49.5" cy="15" r="2.5" fill="#FFFFFF" fill-opacity=".85"/>
</svg>
